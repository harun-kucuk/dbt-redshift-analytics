name: analytics
version: "1.0.0"
profile: analytics

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

on-run-end:
  - "{% if target.name == 'prod' %}{{ store_run_results(results) }}{% endif %}"

models:
  analytics:
    staging:
      +schema: staging_tickit
      +materialized: view
      +bind: false
    intermediate:
      +schema: intermediate
      +materialized: table
    marts:
      +schema: marts
      +materialized: table
