name: analytics
version: "1.0.0"
profile: analytics

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

dispatch:
  - macro_namespace: dbt_artifacts
    search_order: ['analytics', 'dbt_artifacts']

on-run-end:
  - "{% if target.name == 'prod' %}{{ dbt_artifacts.upload_results(results) }}{% endif %}"

models:
  analytics:
    staging:
      +schema: staging_tickit
      +materialized: view
      +bind: false
    intermediate:
      +schema: intermediate
      +materialized: table
    marts:
      +schema: marts
      +materialized: table
  dbt_artifacts:
    +schema: dbt_artifacts
    +materialized: table
