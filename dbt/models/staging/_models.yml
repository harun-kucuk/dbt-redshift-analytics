version: 2

models:
  - name: stg_tickit__sales
    columns:
      - name: sale_id
        tests:
          - unique
          - not_null
      - name: listing_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null
      - name: buyer_id
        tests:
          - not_null
      - name: event_id
        tests:
          - not_null
      - name: price_paid
        tests:
          - not_null
      - name: quantity_sold
        tests:
          - not_null

  - name: stg_tickit__users
    columns:
      - name: user_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null

  - name: stg_tickit__events
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: venue_id
        tests:
          - not_null
      - name: category_id
        tests:
          - not_null

  - name: stg_tickit__venues
    columns:
      - name: venue_id
        tests:
          - unique
          - not_null
      - name: venue_name
        tests:
          - not_null

  - name: stg_tickit__listings
    columns:
      - name: listing_id
        tests:
          - unique
          - not_null
      - name: num_tickets
        tests:
          - not_null
      - name: price_per_ticket
        tests:
          - not_null

  - name: stg_tickit__categories
    columns:
      - name: category_id
        tests:
          - unique
          - not_null
      - name: category_group
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Sports', 'Shows', 'Concerts']

  - name: stg_tickit__dates
    columns:
      - name: date_id
        tests:
          - unique
          - not_null
      - name: year
        tests:
          - not_null
