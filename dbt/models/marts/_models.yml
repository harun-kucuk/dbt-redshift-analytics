version: 2

models:
  - name: fct_sales
    config:
      contract:
        enforced: true
    columns:
      - name: fct_sale_sk
        data_type: varchar
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null
      - name: sale_id
        tests:
          - unique
          - not_null
      - name: event_id
        tests:
          - not_null
      - name: buyer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_id
      - name: seller_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_id
      - name: price_paid
        tests:
          - not_null
          - is_positive
      - name: net_revenue
        tests:
          - not_null
          - is_positive
      - name: category_group
        tests:
          - accepted_values:
              arguments:
                values: ['Sports', 'Shows', 'Concerts']

  - name: dim_users
    config:
      contract:
        enforced: true
    columns:
      - name: user_id
        data_type: integer
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null
      - name: total_purchases
        data_type: bigint
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: total_spent
        data_type: numeric
        constraints:
          - type: not_null
        tests:
          - not_null

  - name: mart_sales_by_category
    columns:
      - name: category_name
        tests:
          - not_null
      - name: sale_year
        tests:
          - not_null
      - name: gross_revenue
        tests:
          - not_null
      - name: net_revenue
        tests:
          - not_null

  - name: mart_top_events
    columns:
      - name: event_id
        tests:
          - not_null
      - name: event_name
        tests:
          - not_null
      - name: gross_revenue
        tests:
          - is_positive
      - name: net_revenue
        tests:
          - is_positive
      - name: total_tickets_sold
        tests:
          - is_positive

  - name: mart_venue_performance
    columns:
      - name: venue_id
        tests:
          - unique
          - not_null
      - name: venue_name
        tests:
          - not_null
      - name: total_net_revenue
        tests:
          - is_positive

  - name: mart_user_segments
    columns:
      - name: user_id
        tests:
          - unique
          - not_null
      - name: buyer_segment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['VIP', 'Regular', 'Occasional', 'Inactive']
      - name: seller_segment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Power Seller', 'Active Seller', 'New Seller', 'Buyer Only']
      - name: interest_segment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Sports', 'Concerts', 'Shows', 'General']
