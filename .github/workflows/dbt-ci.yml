name: dbt-ci

on:
  pull_request:
    branches: [main]
    paths:
      - "dbt/**"

jobs:
  sqlfluff:
    name: SQLFluff Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dbt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SQLFluff
        run: pip install sqlfluff==3.3.1

      - name: Lint SQL
        run: sqlfluff lint models macros tests --dialect ansi

  dbt-ci:
    name: dbt Run & Test (dev db, PR schemas)
    runs-on: ubuntu-latest
    needs: sqlfluff
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dbt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-redshift==1.10.1

      - name: dbt deps
        run: dbt deps

      - name: dbt Run
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: dbt run --profiles-dir . --target ci --full-refresh

      - name: dbt Test
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: dbt test --profiles-dir . --target ci
