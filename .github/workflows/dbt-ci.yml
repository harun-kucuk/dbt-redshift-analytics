name: dbt-ci

on:
  pull_request:
    branches: [main]
    paths:
      - "dbt/**"
      - ".github/workflows/dbt-ci.yml"

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: eu-west-2

jobs:
  sqlfluff:
    name: SQLFluff Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dbt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SQLFluff
        run: pip install sqlfluff==3.3.1

      - name: Lint SQL
        run: sqlfluff lint models macros tests --dialect ansi

  dbt-ci:
    name: dbt Run & Test (dev db, PR schemas)
    runs-on: ubuntu-latest
    needs: sqlfluff
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dbt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-redshift==1.10.1

      - name: dbt deps
        run: dbt deps

      - name: Resolve dbt state location
        id: state_bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          echo "bucket=analytics-dbt-state-${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          mkdir -p state/prod

      - name: Download latest prod manifest
        id: download_manifest
        run: |
          if aws s3 cp "s3://${{ steps.state_bucket.outputs.bucket }}/artifacts/prod/manifest.json" state/prod/manifest.json; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: List modified nodes
        if: steps.download_manifest.outputs.found == 'true'
        id: modified_nodes
        env:
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          dbt ls \
            --profiles-dir . \
            --target ci \
            --defer \
            --state state/prod \
            --select state:modified+1 | tee /tmp/dbt_modified_nodes_ci.txt
          if [ -s /tmp/dbt_modified_nodes_ci.txt ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: dbt Build Changed Nodes
        if: steps.download_manifest.outputs.found == 'true' && steps.modified_nodes.outputs.found == 'true'
        env:
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          dbt build \
            --profiles-dir . \
            --target ci \
            --defer \
            --state state/prod \
            --select state:modified+1

      - name: No modified nodes
        if: steps.download_manifest.outputs.found == 'true' && steps.modified_nodes.outputs.found != 'true'
        run: echo "No modified dbt nodes detected by state:modified+1."

      - name: dbt Build Full Graph
        if: steps.download_manifest.outputs.found != 'true'
        env:
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: dbt build --profiles-dir . --target ci
