name: terraform-cd

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: eu-west-2
  TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}

jobs:
  terraform-cd:
    name: Terraform Apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Notify Slack on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request
          payload = {
            "attachments": [{
              "color": "danger",
              "title": ":x: terraform-cd failed",
              "fields": [
                {"title": "Branch",       "value": os.environ["BRANCH"],     "short": True},
                {"title": "Triggered by", "value": os.environ["ACTOR"],      "short": True},
                {"title": "Commit",       "value": f"<{os.environ['COMMIT_URL']}|{os.environ['COMMIT_SHA'][:7]}> {os.environ['COMMIT_MSG']}", "short": False},
              ],
              "actions": [{"type": "button", "text": "View run", "url": os.environ["RUN_URL"]}]
            }]
          }
          req = urllib.request.Request(
            os.environ["SLACK_WEBHOOK"],
            data=json.dumps(payload).encode(),
            headers={"Content-Type": "application/json"}
          )
          urllib.request.urlopen(req)
          EOF
