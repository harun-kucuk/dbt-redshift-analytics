name: dbt-cd

on:
  push:
    branches: [main]
    paths:
      - "dbt/**"

jobs:
  dbt-cd:
    name: dbt Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dbt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        id: install
        run: pip install dbt-redshift

      - name: dbt deps
        id: deps
        run: dbt deps

      - name: dbt Run
        id: dbt_run
        env:
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
        run: dbt run --profiles-dir .

      - name: dbt Test
        id: dbt_test
        env:
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
        run: exit 1  # intentional failure — remove after Slack verified

      - name: Notify Slack on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          STEP_INSTALL: ${{ steps.install.outcome }}
          STEP_DEPS: ${{ steps.deps.outcome }}
          STEP_RUN: ${{ steps.dbt_run.outcome }}
          STEP_TEST: ${{ steps.dbt_test.outcome }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request

          steps = {
            "Install dbt":  os.environ["STEP_INSTALL"],
            "dbt deps":     os.environ["STEP_DEPS"],
            "dbt Run":      os.environ["STEP_RUN"],
            "dbt Test":     os.environ["STEP_TEST"],
          }
          failed_step = next((name for name, outcome in steps.items() if outcome == "failure"), "unknown")

          payload = {
            "attachments": [{
              "color": "danger",
              "title": ":x: dbt-cd failed",
              "fields": [
                {"title": "Failed step",  "value": failed_step,              "short": True},
                {"title": "Triggered by", "value": os.environ["ACTOR"],      "short": True},
                {"title": "Branch",       "value": os.environ["BRANCH"],     "short": True},
                {"title": "Commit",       "value": f"<{os.environ['COMMIT_URL']}|{os.environ['COMMIT_SHA'][:7]}> {os.environ['COMMIT_MSG'].splitlines()[0]}", "short": True},
              ],
              "actions": [{"type": "button", "text": "View run", "url": os.environ["RUN_URL"]}]
            }]
          }
          req = urllib.request.Request(
            os.environ["SLACK_WEBHOOK"],
            data=json.dumps(payload).encode(),
            headers={"Content-Type": "application/json"}
          )
          urllib.request.urlopen(req)
          EOF
